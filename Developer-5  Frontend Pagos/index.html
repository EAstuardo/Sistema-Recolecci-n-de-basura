<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema de Pagos</title>
  <link href="https://fonts.googleapis.com/css2?family=Nexa:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<header>
  <h1>Sistema <span>Tul</span></h1>
  <div class="theme-switch" onclick="toggleTheme()" title="Cambiar tema">
    <span class="theme-label" id="themeLabel">Oscuro</span>
    <div class="switch-track" id="switchTrack">
      <div class="switch-thumb" id="switchThumb"></div>
    </div>
  </div>
</header>

<main>

  <div>
    <p class="section-title">Resumen</p>
    <div class="stats-grid">
      <div class="stat-card green">
        <p class="stat-label">Clientes Pagados</p>
        <p class="stat-value" id="countPagados">0</p>
      </div>
      <div class="stat-card red">
        <p class="stat-label">Clientes Pendientes</p>
        <p class="stat-value" id="countPendientes">0</p>
      </div>
      <div class="stat-card yellow">
        <p class="stat-label">Total Clientes</p>
        <p class="stat-value" id="countTotal">0</p>
      </div>
    </div>
  </div>

  <div>
    <p class="section-title">Lista de Clientes</p>
    <div class="toolbar" style="margin-bottom:20px;">
      <input class="search-box" type="text" id="searchInput" placeholder="Buscar cliente por nombre o colonia…"/>
      <button class="filter-btn active" onclick="setFilter(this,'todos')">Todos</button>
      <button class="filter-btn"        onclick="setFilter(this,'pagado')">Pagados</button>
      <button class="filter-btn red"    onclick="setFilter(this,'pendiente')">Pendientes</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Cliente</th>
            <th>Colonia</th>
            <th>Monto mensual</th>
            <th>Estado</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="clientTableBody"></tbody>
      </table>
    </div>
  </div>

</main>

<div class="overlay" id="modalOverlay">
  <div class="modal">
    <button class="close-modal" onclick="closeModal()">✕</button>
    <p class="modal-header">Registrar Pago</p>
    <p class="modal-sub" id="modalSubtitle">Cliente seleccionado</p>
    <div class="form-group">
      <label>Monto pagado (Q)</label>
      <input type="number" id="montoPago" placeholder="0.00" min="0" step="0.01"/>
    </div>
    <div class="form-group">
      <label>Fecha de pago</label>
      <input type="date" id="fechaPago"/>
    </div>
    <div class="form-group">
      <label>Método de pago</label>
      <select id="metodoPago">
        <option value="">Seleccionar…</option>
        <option value="efectivo">Efectivo</option>
        <option value="transferencia">Transferencia</option>
        <option value="cheque">Cheque</option>
      </select>
    </div>
    <div class="form-group">
      <label>Notas (opcional)</label>
      <input type="text" id="notasPago" placeholder="Ej: pago parcial, adelanto…"/>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel"  onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm" onclick="confirmarPago()">Confirmar Pago</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
